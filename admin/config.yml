backend:
  name: github
  repo: VinniWe/mind-studio-website
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "uploads" # Media files will be stored in the repo under uploads
public_folder: "/uploads" # The src attribute for uploaded media

locale: "de" # Set German as default language

collections:
  # Global Settings
  - name: "settings"
    label: "Einstellungen"
    files:
      - label: "Globale Einstellungen"
        name: "settings"
        file: "content/pages/settings.md"
        fields:
          - label: "Ankündigungs-Banner"
            name: "announcement_bar"
            widget: "object"
            fields:
              - {label: "Aktiv", name: "active", widget: "boolean", default: false}
              - {label: "Text", name: "text", widget: "string", required: false}
              - {label: "Link Text", name: "link_text", widget: "string", required: false}
              - {label: "Link URL", name: "link_url", widget: "string", required: false}
          - label: "Laufband 1 – Orange (Startseite oben)"
            name: "marquee_primary"
            widget: "list"
            hint: "Texte für das orange Laufband nach dem Hero"
            field: {label: "Text", name: "item", widget: "string"}
          - label: "Laufband 2 – Dunkel (Startseite mitte)"
            name: "marquee_secondary"
            widget: "list"
            hint: "Texte für das dunkle Laufband zwischen Angebot und Ansatz"
            field: {label: "Text", name: "item", widget: "string"}

  # Slider Collection
  - name: "slider"
    label: "Slider"
    label_singular: "Slide"
    folder: "content/slider"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Subtitle", name: "subtitle", widget: "string", required: false}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Meta Text", name: "meta", widget: "string", required: false}
      - {label: "Desktop Bild", name: "image_desktop", widget: "image", required: false}
      - {label: "Mobil Bild", name: "image_mobile", widget: "image", required: false}
      - {label: "CTA Text", name: "cta_text", widget: "string", default: "Mehr erfahren"}
      - {label: "CTA Link", name: "cta_link", widget: "string"}
      - {label: "Reihenfolge", name: "order", widget: "number", default: 0, value_type: "int", min: 0}
      - {label: "Aktiv", name: "active", widget: "boolean", default: true}

  # Site Content - Single file collection for all page content
  - name: "pages"
    label: "Seiten Inhalte"
    files:
      # Homepage
      - label: "Startseite"
        name: "home"
        file: "content/pages/home.md"
        fields:
          - label: "Statistiken"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Quelle", name: "source", widget: "string"}
          - label: "Angebot Sektion"
            name: "services_section"
            widget: "object"
            fields:
              - {label: "Überschrift", name: "title", widget: "string"}
              - {label: "Untertitel", name: "subtitle", widget: "text"}
              - label: "Einzelpersonen"
                name: "individual"
                widget: "object"
                fields:
                  - {label: "Eyebrow", name: "eyebrow", widget: "string"}
                  - {label: "Titel", name: "title", widget: "string"}
                  - {label: "Beschreibung", name: "description", widget: "text"}
                  - {label: "Link", name: "link", widget: "string", default: "leistungen-einzel.html"}
              - label: "Organisationen"
                name: "organizations"
                widget: "object"
                fields:
                  - {label: "Eyebrow", name: "eyebrow", widget: "string"}
                  - {label: "Titel", name: "title", widget: "string"}
                  - {label: "Beschreibung", name: "description", widget: "text"}
                  - {label: "Link", name: "link", widget: "string", default: "leistungen-organisationen.html"}
          - label: "Ansatz Sektion"
            name: "approach_section"
            widget: "list"
            min: 1
            max: 4
            fields:
              - {label: "Icon (Emoji)", name: "icon", widget: "string", default: "✦", hint: "z. B. ✦ 🌿 🤝 💡"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Beschreibung", name: "description", widget: "text"}
          - label: "Testimonials"
            name: "testimonials"
            widget: "object"
            fields:
              - {label: "Überschrift", name: "title", widget: "string"}
              - {label: "Untertitel", name: "subtitle", widget: "text"}
              - label: "Zitate"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Zitat", name: "quote", widget: "text"}
                  - {label: "Autor", name: "author", widget: "string"}
                  - {label: "Rolle", name: "role", widget: "string"}

      # Services Individual Page
      - label: "Leistungen Einzelpersonen"
        name: "services_individual"
        file: "content/pages/services-individual.md"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Lead Text", name: "lead", widget: "text"}
              - {label: "CTA Text", name: "cta_text", widget: "string"}
              - {label: "CTA Link", name: "cta_link", widget: "string"}
          - label: "Laufband"
            name: "marquee_items"
            widget: "list"
            hint: "Texte für das Laufband nach dem Hero"
            field: {label: "Text", name: "item", widget: "string"}
          - label: "Typische Anliegen"
            name: "concerns"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}
          - label: "Ablauf"
            name: "process"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}

      # Services Organizations Page
      - label: "Leistungen Organisationen"
        name: "services_organizations"
        file: "content/pages/services-organizations.md"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Lead Text", name: "lead", widget: "text"}
              - {label: "CTA Text", name: "cta_text", widget: "string"}
              - {label: "CTA Link", name: "cta_link", widget: "string"}
          - label: "Laufband"
            name: "marquee_items"
            widget: "list"
            hint: "Texte für das Laufband nach dem Hero"
            field: {label: "Text", name: "item", widget: "string"}
          - label: "Formate"
            name: "formats"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}
          - label: "Vorgehen"
            name: "procedure"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}

      # Approach Page
      - label: "Ansatz"
        name: "approach"
        file: "content/pages/approach.md"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Lead Text", name: "lead", widget: "text"}
          - label: "Laufband"
            name: "marquee_items"
            widget: "list"
            hint: "Texte für das Laufband nach dem Hero"
            field: {label: "Text", name: "item", widget: "string"}
          - label: "Prinzipien"
            name: "principles"
            widget: "list"
            min: 1
            max: 4
            fields:
              - {label: "Icon (Emoji)", name: "icon", widget: "string", default: "✦", hint: "z. B. ✦ 🌿 🤝 💡"}
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Beschreibung", name: "description", widget: "text"}
          - label: "Rahmen"
            name: "framework"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}
          - label: "Methoden"
            name: "methods"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - label: "Liste"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}

      # About Page
      - label: "Über mich"
        name: "about"
        file: "content/pages/about.md"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Lead Text", name: "lead", widget: "text"}
              - {label: "Profilfoto", name: "photo", widget: "image", required: false, hint: "Quadratisches Bild empfohlen (wird rund angezeigt)"}
          - label: "Laufband"
            name: "marquee_items"
            widget: "list"
            hint: "Texte für das Laufband nach dem Hero"
            field: {label: "Text", name: "item", widget: "string"}
          - label: "Kurzbiografie"
